<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ecom Cards</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            background: #0b0b0f;
        }

        .ecom-section {
            padding: 120px 0;
        }

        .ecom-wrapper {
            position: relative;
            border-radius: 20px;
            overflow: hidden;
            margin-left: 50px;
        }

        .ecom-img {
            width: 1387px;
            height: 574px;
            object-fit: cover;
            border-radius: 13.28px;
        }

        .card-stack {
            position: absolute;
            top: 60px;
            left: 60px;
            width: 520px;
            perspective: 1200px;
        }

        .stack-layer {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 18px;
            transition: 0.8s cubic-bezier(.17, .67, .35, 1);
        }

        .layer-1 {
            background: #DDD8FF;
            top: -18px;
            left: 18px;
        }

        .layer-2 {
            background: #4D4481;
            top: -10px;
            left: 10px;
        }

        .cards {
            position: relative;
            width: 100%;
            height: 100%;
        }

        .ecom-card {
            position: absolute;
            width: 100%;
            padding: 40px;
            border-radius: 18px;
            color: white;
            background: linear-gradient(135deg, #39316C, #150F3D);
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.6);
            transition: 0.8s cubic-bezier(.17, .67, .35, 1);
            backface-visibility: hidden;
        }

        .card2 {
            transform: translateY(40px) scale(0.92);
            opacity: 0.7;
            z-index: 1;
        }

        .card1 {
            z-index: 2;
        }

        .swap .card1 {
            transform: translateY(-60px) rotateX(40deg) scale(0.9);
            opacity: 0;
            z-index: 1;
        }

        .swap .card2 {
            transform: translateY(0) scale(1);
            opacity: 1;
            z-index: 3;
        }

        .icon-circle {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 25px;
        }

        .ecom-title {
            font-size: 34px;
            font-weight: 500;
            margin-bottom: 20px;
        }

        .ecom-title span {
            color: #a996ff;
            font-weight: 600;
        }

        .ecom-text {
            font-size: 15px;
            color: #dcdcdc;
            line-height: 1.7;
            max-width: 420px;
        }

        @media (max-width: 1200px) {

            .ecom-wrapper {
                margin-left: 0;
            }

            .ecom-img {
                width: 100%;
                height: 520px;
            }

            .card-stack {
                width: 460px;
                top: 50px;
                left: 40px;
            }

        }

        @media (max-width: 991px) {

            .ecom-section {
                padding: 80px 0;
            }

            .ecom-img {
                width: 100%;
                height: 420px;
            }

            .card-stack {
                position: relative;
                top: auto;
                left: auto;
                margin: -120px auto 0;
                width: 85%;
            }

            .ecom-card {
                padding: 30px;
            }

            .ecom-title {
                font-size: 26px;
            }

        }

        @media (max-width: 576px) {

            .ecom-section {
                padding: 60px 0;
            }

            .ecom-img {
                height: 300px;
            }

            .card-stack {
                width: 92%;
                margin: -100px auto 0;
            }

            .ecom-card {
                padding: 24px;
                border-radius: 14px;
            }

            .stack-layer {
                border-radius: 14px;
            }

            .layer-1 {
                top: -14px;
                left: 14px;
            }

            .layer-2 {
                top: -8px;
                left: 8px;
            }

            .ecom-title {
                font-size: 22px;
                line-height: 1.4;
            }

            .ecom-text {
                font-size: 14px;
            }

            .icon-circle {
                width: 40px;
                height: 40px;
                margin-bottom: 18px;
            }

        }
    </style>
</head>

<body>

    <section class="ecom-section">
        <div class="container">
            <div class="ecom-wrapper">

                <img src="Empower.png" class="ecom-img" alt="">

                <div class="card-stack">

                    <div class="stack-layer layer-1"></div>
                    <div class="stack-layer layer-2"></div>

                    <div class="cards" id="cardContainer">

                        <div class="ecom-card card1">
                            <div class="icon-circle">
                                <i class="bi bi-box-seam"></i>
                            </div>

                            <h2 class="ecom-title">
                                Empower your <br>
                                <span>e-commerce business</span>
                            </h2>

                            <p class="ecom-text">
                                Faster payments, instant refunds, and seamless checkout experiences.
                            </p>
                        </div>

                        <div class="ecom-card card2">
                            <div class="icon-circle">
                                <i class="bi bi-lightning"></i>
                            </div>

                            <h2 class="ecom-title">
                                Lightning Fast <br>
                                <span>API Integration</span>
                            </h2>

                            <p class="ecom-text">
                                Developer-friendly APIs designed for effortless integration and scaling.
                            </p>
                        </div>

                    </div>

                </div>

            </div>
        </div>
    </section>


    <script>
        const container = document.getElementById("cardContainer");

        function swapCards() {
            container.classList.toggle("swap");
        }

        setInterval(swapCards, 3000);

        container.addEventListener("mouseenter", swapCards);
    </script>

</body>

</html>
