<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OnePG</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="mobile-menu" id="mobileMenu">
        <a href="#">Home</a>
        <a href="#">Products</a>
        <a href="#">Blog</a>
        <a href="#">Contact</a>
    </div>

    <section class="hero">

        <div class="star star1">
            <svg viewBox="0 0 85 85" fill="white">
                <path d="M42.5 0 L50 32 L85 42.5 L50 53 L42.5 85 L35 53 L0 42.5 L35 32 Z" />
            </svg>
        </div>

        <div class="star star2">
            <svg viewBox="0 0 85 85" fill="white">
                <path d="M42.5 0 L50 32 L85 42.5 L50 53 L42.5 85 L35 53 L0 42.5 L35 32 Z" />
            </svg>
        </div>

        <div class="star star3">
            <svg viewBox="0 0 85 85" fill="white">
                <path d="M42.5 0 L50 32 L85 42.5 L50 53 L42.5 85 L35 53 L0 42.5 L35 32 Z" />
            </svg>
        </div>
        <div class="star star4">
            <svg viewBox="0 0 85 85" fill="white">
                <path d="M42.5 0 L50 32 L85 42.5 L50 53 L42.5 85 L35 53 L0 42.5 L35 32 Z" />
            </svg>
        </div>

        <div class="plus-small"></div>

        <div class="ellipse-top"></div>
        <div class="ellipse-glow"></div>

        <div class="header-wrapper">
            <div class="custom-navbar">

                <div class="logo">one<b>pg</b></div>

                <div class="menu-toggle" onclick="toggleMenu()">☰</div>

                <div class="nav-center">
                    <a href="#">Home</a>
                    <a href="#">Products</a>
                    <a href="#">Blog</a>
                    <a href="#">Contact us</a>
                </div>

                <div class="nav-right">
                    <span>Sign up</span>
                    <button class="login-btn">Log in</button>
                </div>

            </div>
        </div>

        <div class="container hero-content">

            <div class="row align-items-center hero-row">

                <div class="col-lg-6 text-col">
                    <h1>
                        Route Better. Pay<br>
                        Faster. Verify<br>
                        Smarter – <span>Onepg</span>
                    </h1>

                    <p>
                        One Platform for Payments, Routing Efficiency & Secure Verification
                    </p>
                </div>

                <div class="col-lg-6 image-col">
                    <div class="image-stack">
                        <img src="hero.png" class="main-img">
                    </div>
                </div>

            </div>

            <div class="row">
                <div class="col-12">
                    <div class="hero-buttons">

                        <button class="primary-btn">Get Started</button>

                        <div class="divider-vertical"></div>

                        <div class="d-flex align-items-center gap-2">
                            <div class="play-btn">▶</div>
                            <span>How it works</span>
                        </div>

                    </div>
                </div>
            </div>

        </div>

    </section>
     <section class="money-section">
        
     </section>
    <script>
        function toggleMenu() {
            document.getElementById("mobileMenu").classList.toggle("active");
        }
    </script>

</body>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>


</html>
